<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Barabara Alerts cover</title>
  <desc id="desc">Text-based cover artwork for the Barabara Alerts project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <g opacity="0.16">
    <circle cx="180" cy="180" r="120" fill="#ffffff" />
    <circle cx="1040" cy="160" r="90" fill="#ffffff" />
    <circle cx="980" cy="650" r="140" fill="#ffffff" />
  </g>
  <g>
    <rect x="110" y="120" width="980" height="560" rx="32" fill="url(#card)" stroke="rgba(255,255,255,0.25)" />
    <rect x="170" y="188" width="150" height="150" rx="24" fill="rgba(255,255,255,0.14)" />
    <path d="M215 288 L245 238 L275 288 Z" fill="#f8fafc" />
    <rect x="232" y="288" width="26" height="62" rx="13" fill="#f8fafc" />
    <text x="370" y="250" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="4">ROAD-SAFETY MOBILE PLATFORM</text>
    <text x="170" y="430" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="700">Barabara Alerts</text>
    <text x="170" y="500" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="34">Android and iOS reporting app with Laravel backend</text>
    <text x="170" y="548" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="34">and NextJS web frontend delivery.</text>
    <rect x="170" y="590" width="200" height="54" rx="27" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.2)" />
    <text x="208" y="625" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Laravel</text>
    <rect x="392" y="590" width="180" height="54" rx="27" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.2)" />
    <text x="437" y="625" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Mobile</text>
    <rect x="594" y="590" width="182" height="54" rx="27" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.2)" />
    <text x="633" y="625" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">NextJS</text>
  </g>
</svg>
